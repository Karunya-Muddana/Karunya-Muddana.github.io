<main class="chat-page">
  <article class="notebook">
    <div class="holes"><span class="mid"></span></div>

    <div class="notebook-page">
      <header class="notebook-head">
        <div class="chapter">— in Karunya&rsquo;s own hand —</div>
        <h1>Ask me <em>anything</em>.</h1>
        <p class="subhead">I&rsquo;ll write back. The page does the talking &mdash; ink fades in as I think.</p>
      </header>

      <div class="messages" id="messages">
        <div class="suggested" id="suggested">
          <p class="hint">— try asking —</p>
          <button class="suggest-btn">Tell me about Project Smith</button>
          <button class="suggest-btn">What&rsquo;s your tech stack?</button>
          <button class="suggest-btn">What are you working on now?</button>
          <button class="suggest-btn">Looking for an internship?</button>
        </div>
      </div>

      <form class="composer" id="composer" autocomplete="off">
        <input id="chat-input" placeholder="write your question here&hellip;" maxlength="1000" autocomplete="off" />
        <button type="submit" class="send-btn" id="send-btn" aria-label="Send">↵</button>
      </form>
      <div class="composer-hint">press enter to send · this chat is private &amp; ephemeral</div>
    </div>
  </article>
</main>

<script src="portfolio.js"></script>
<script src="chat.js"></script>
